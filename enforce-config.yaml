agent:
  listen_addr: "127.0.0.1"
  listen_port: 8787
  mode: "enforce"
  fail_mode: "fail_closed"
  monitor:
    scan_paths:
      - "/conversation"
      - "/v1/messages"
      - "/chat/completions"
      - "generateContent"
      - "/chat/"
  vault:
    ttl: 168h

tls:
  ca_name: "Qindu AI Privacy CA"
  ca_validity_years: 10
  ca_key_algorithm: "ECDSA_P256"
  cert_cache_enabled: true
  upstream_validation: "system"

providers:
  chatgpt:
    enabled: true
    domains:
      - "chatgpt.com"
      - "api.openai.com"
  claude:
    enabled: true
    domains:
      - "claude.ai"

logging:
  level: "info"
  format: "json"
  pii_logging: false
  output: "file"
  log_dir: ""
