name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  golangci-lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version: "1.26"

      - name: Cache Go modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa  # v7
        with:
          version: v2.7.2

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go 1.26
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version: "1.26"

      - name: Cache Go modules
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.26-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.26-

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run tests with race detector and coverage
        run: go test -race -count=1 -timeout 120s -coverprofile=coverage.out ./...

      # Cross-compilation verification for all packages (no binary output).
      # `go build ./...` compiles but discards the resulting objects — it serves
      # only to verify that every package cross-compiles cleanly for the target.
      - name: Cross-compile check — Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -v ./...

      - name: Cross-compile check — Windows (arm64)
        run: GOOS=windows GOARCH=arm64 go build -v ./...

      # Artifact build: produces agent.exe for upload. This step targets only the
      # cmd/agent package and emits a named output binary. It is separate from the
      # cross-compilation checks above because those verify all packages but
      # discard the build output.
      - name: Build agent.exe for Windows (amd64)
        run: GOOS=windows GOARCH=amd64 go build -o agent.exe ./cmd/agent/

      - name: Generate SHA256 checksum for agent.exe
        run: sha256sum agent.exe > agent.exe.sha256

      - name: Upload agent.exe artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: agent-windows-amd64
          path: |
            agent.exe
            agent.exe.sha256

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: warn

  format:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version: "1.26"

      - name: Check formatting
        run: |
          go fmt ./...
          git diff --exit-code || (echo "Code is not formatted. Run 'go fmt ./...' locally." && exit 1)

  validate-wix:
    name: Validate WiX Sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install xml utilities
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate XML well-formedness
        run: find installer/wix -name "*.wxs" -exec xmllint --noout {} \;

      - name: Check include references
        run: |
          errors=0
          for wxs in $(find installer/wix -name "*.wxs"); do
            dir=$(dirname "$wxs")
            includes=$(grep -oP '<?include\s+\K[^?]+' "$wxs" 2>/dev/null || true)
            for inc in $includes; do
              resolved="$dir/$inc"
              if [ ! -f "$resolved" ]; then
                echo "ERROR: $wxs references non-existent include: $inc (resolved: $resolved)"
                errors=$((errors + 1))
              fi
            done
          done
          if [ "$errors" -gt 0 ]; then
            echo "Found $errors broken include reference(s)"
            exit 1
          fi
          echo "All include references valid."

  build-msi:
    name: Build MSI Installer
    needs: [test, validate-wix]
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b  # v5.4.0
        with:
          go-version: "1.26"

      - name: Run go vet (Windows)
        run: go vet ./...

      - name: Run tests on Windows
        run: go test -race -count=1 -timeout 180s ./...

      - name: Build agent.exe for Windows
        run: go build -o installer/wix/agent.exe ./cmd/agent/

      - name: Copy default config
        shell: cmd
        run: |
          mkdir installer\wix\configs
          copy configs\default.yaml installer\wix\configs\default.yaml

      - name: Install WiX Toolset
        run: choco install wixtoolset --version=3.14.1 -y --no-progress

      - name: Extract version from tag (strip v prefix)
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)') {
              $version = $matches[1]
          } else {
              $sha = "${{ github.sha }}".Substring(0, 8)
              $version = "0.0.0-dev-$sha"
          }
          echo "VERSION=$version" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Build MSI
        working-directory: installer/wix
        run: |
          candle qindu.wxs -dProductVersion=%VERSION% -ext WixUIExtension
          light qindu.wixobj -out Qindu-Installer-x64.msi -cultures:en-us -loc locale/en-us.wxl -ext WixUIExtension
        shell: cmd

      # ─── Code Signing (Future) ─────────────────────────────────────────
      # Uncomment and configure this step when an EV Code Signing
      # Certificate is available. Required repository secrets:
      #   - CODE_SIGNING_CERTIFICATE (base64-encoded PFX, as a GitHub secret)
      #   - CODE_SIGNING_PASSWORD (PFX password, as a GitHub secret)
      # Tools required on the runner:
      #   - Windows SDK signtool.exe (included on windows-latest runner)
      #   - Or: AzureSignTool / jsign for non-Windows signing
      # See docs/signing.md for full setup instructions.
      #
      # - name: Sign agent.exe
      #   shell: pwsh
      #   run: |
      #     signtool sign /fd SHA256 /f certificate.pfx /p $env:CODE_SIGNING_PASSWORD installer/wix/agent.exe
      #   env:
      #     CODE_SIGNING_CERTIFICATE: ${{ secrets.CODE_SIGNING_CERTIFICATE }}
      #     CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}

      # NOTE: certutil produces a multi-line header format (different from the
      # Linux sha256sum `HASH  filename` format used in the test job). This is
      # a known inconsistency — see dev-notes fix cycle 2 for rationale.
      - name: Generate SHA256 checksum
        working-directory: installer/wix
        run: |
          certutil -hashfile Qindu-Installer-x64.msi SHA256 > Qindu-Installer-x64.msi.sha256
        shell: cmd

      - name: Upload MSI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: Qindu-Installer-x64.msi
          path: |
            installer/wix/Qindu-Installer-x64.msi
            installer/wix/Qindu-Installer-x64.msi.sha256
