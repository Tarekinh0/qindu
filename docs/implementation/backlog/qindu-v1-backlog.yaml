# Qindu V1 Backlog
schema_version: "1.0"
backlog_id: "qindu-v1"
owner_agent: "qindu-orchestrator"

defaults:
  no_prod_apply_without_human_approval: true
  test_count_mode: "cumulative — test_count reflects total project test suite size at sprint closure, not tests added by that sprint"

risks:
  - id: R-001
    title: "MSI non signé — SmartScreen warning"
    affects: [QINDU-0002]
    severity: low
    status: accepted
    resolution: "Accepté pour V1 dev. Certificat OV/EV requis pour release publique."
  - id: R-002
    title: "Faux négatifs hex hashes"
    affects: [QINDU-0005, QINDU-0006, QINDU-0009]
    severity: low
    status: accepted
    resolution: "Longueurs connues (32, 40, 64, 128 hex) exclues comme faux positifs."
  - id: R-003
    title: "Évasion Unicode (confusables)"
    affects: [QINDU-0005]
    severity: medium
    status: accepted
    resolution: "PII avec confusables non-ASCII contourne les regex. Accepté pour V1."
  - id: R-004
    title: "Évasion par chunking"
    affects: [QINDU-0007, QINDU-0009, QINDU-0010]
    severity: medium
    status: accepted
    resolution: "PII fragmenté entre chunks non réassemblé avant QINDU-0010."
  - id: R-005
    title: "Core dump exposure PII"
    affects: [QINDU-0005, QINDU-0009]
    severity: low
    status: accepted
    resolution: "Valeurs PII en mémoire. Crash dumps Go peuvent les contenir. Limitation runtime."
  - id: R-006
    title: "Certificat signature code absent"
    affects: [QINDU-0002, QINDU-0004]
    severity: medium
    status: accepted
    resolution: "Acquisition certificat OV/EV nécessaire avant release publique."
  - id: R-007
    title: "Pas de fuzzing ni benchmarks"
    affects: [QINDU-0005, QINDU-0006]
    severity: low
    status: accepted
    resolution: "Différé à sprint futur dédié."
  - id: R-008
    title: "DPAPI sans couverture de tests unitaires"
    affects: [QINDU-0001, QINDU-0008]
    severity: low
    status: accepted
    resolution: "DPAPI nécessite Windows. Tests manuels ou VM."
  - id: R-009
    title: "Adapter avant enforce — ordre non conventionnel"
    affects: [QINDU-0011]
    severity: low
    status: resolved
    resolution: "QINDU-0011 (ChatGPT adapter) livré avant QINDU-0009 (enforce). L'ordre inversé a permis d'éviter les faux positifs sur tokens internes ChatGPT. Risque clos — l'architecture provider-agnostic est validée end-to-end."
  - id: R-010
    title: "vault.key non shreddé après PurgeAll"
    affects: [QINDU-0008]
    severity: medium
    status: accepted
    resolution: "Le fichier vault.key survit à une purge complète. Un attaquant avec accès disque + anciens snapshots bbolt pourrait déchiffrer le PII historique. Accepté pour V1 — opération 'purge all + shred key' à concevoir dans un sprint DPO futur (ex: rotation de clé + overwrite + sync + rename). Documenté dans CISO F-002 / DPO NB-2."
  - id: R-011
    title: "/tmp CA fallback sur Unix — clé CA exposée"
    affects: [QINDU-0018, QINDU-0019]
    severity: medium
    status: accepted
    resolution: "getCADir() tombe sur /tmp/qindu-ca si PROGRAMDATA et HOME sont absents. Sur Linux multi-utilisateur, /tmp est world-readable → clé CA exposée. Inatteignable sur Windows (PROGRAMDATA toujours défini). DOIT être retiré dans QINDU-0018 — reject startup si pas de home dir au lieu du fallback. Documenté dans CISO F-005 / DPO NB-1."
  - id: R-012
    title: "Pas de rotation/retention des logs fichier"
    affects: [QINDU-0007]
    severity: medium
    status: accepted
    resolution: "Les fichiers de log croissent sans limite en mode output:file. Pas de rotation, pas de limite de taille, pas de rétention automatique. Accepté pour V1 dev. Rotation à ajouter dans sprint maintenance futur ou intégré à QINDU-0020 (fenêtre config). Documenté dans QINDU-0007 closure APC-6."
  - id: R-013
    title: "Overflow canal async → perte silencieuse mappings PII"
    affects: [QINDU-0009]
    severity: low
    status: accepted
    resolution: "Buffer canal 1024. Sous charge extrême (<1% probabilité), les écritures vault sont droppées avec un WARN log (PII-free). Le proxy continue en mode mémoire — pas de PII leaked, mais mapping non persisté. Accepté V1 (design decision DD-10). Test de recovery overflow (vérifier émission WARN) à ajouter dans QINDU-0009."
  - id: R-014
    title: "MSI orphaned registration — installation interrompue"
    affects: [QINDU-0002]
    severity: medium
    status: resolved
    resolution: "Résolu dans QINDU-0009. Cross-compilation pur x64 (GOARCH=amd64 CGO_ENABLED=0) + WiX Toolset v3.14.1 a éliminé l'erreur 1920. MSI install clean, service démarre, enforce mode fonctionnel. Vérifié QEMU sur DESKTOP-8KDT8DJ."
  - id: R-015
    title: "Permissions fichier log 0644 au lieu de 0600"
    affects: [QINDU-0007]
    severity: low
    status: accepted
    resolution: "Les fichiers de log agent.log sont créés en 0644 (world-readable) au lieu de 0600. Sur machine multi-utilisateur, les métadonnées de détection PII (compteurs, types) seraient lisibles par d'autres utilisateurs. Pas de PII values dans les logs. Correction triviale dans un sprint maintenance futur. Documenté dans QINDU-0007 closure PR-200."
  - id: R-016
    title: "CA absente du Windows trust store — regression QINDU-0004"
    affects: [QINDU-0002]
    severity: medium
    status: accepted
    resolution: "La CA n'est plus installée dans le trust store Windows suite à une regression identifiée pendant QINDU-0007. Les certificats feuilles MITM ne sont pas reconnus par le navigateur → erreurs TLS. Correction dans un HOTFIX ou sprint maintenance futur. Documenté dans QINDU-0007 closure CA."
  - id: R-017
    title: "valueToToken — clés PII sur heap Go standard (bypass arena locking)"
    affects: [QINDU-0006, QINDU-0009]
    severity: medium
    status: accepted
    resolution: "Les clés de la map valueToToken (PII en clair) résident sur le heap Go standard, hors de l'arène verrouillée. Un process swap exposerait ces clés dans le pagefile. L'arène mlock protège les valeurs du mapping mais pas les clés de lookup. Accepté V1 — commentaire WARNING documente le trade-off. Résolution future: dedup par hash pour éviter de stocker le PII comme clé. Documenté dans QINDU-0006 peer/CISO/DPO/QA (4 reviewers)."
  - id: R-018
    title: "Memory locking CI — happy path non testable sous Linux"
    affects: [QINDU-0006]
    severity: medium
    status: accepted
    resolution: "Le CI Linux n'a pas CAP_IPC_LOCK/RLIMIT_MEMLOCK. Seul le chemin fallback (non-locked) est testé automatiquement. Si le code arena (alloc, reset) casse silencieusement, aucun test automatisé ne le détecte. La VM QEMU Windows est la seule vérification du vrai locking. Accepté V1 — ajouter CAP_IPC_LOCK au runner CI si disponible, sinon documenter. Documenté dans QINDU-0006 CISO/QA (2 reviewers)."
  - id: R-019
    title: "MemoryStore.Close() — fuite arena (VirtualFree/Munmap jamais appelé)"
    affects: [QINDU-0006]
    severity: medium
    status: accepted
    resolution: "~4 MiB d'espace d'adressage virtuel fuité par conversation. VirtualFree/Munmap jamais appelé dans Close(). Pour QINDU-0008 (vault process-lifetime) c'est acceptable — l'arène vit avec le processus. Pour une utilisation générique de MemoryStore, c'est une fuite de ressources. Accepté V1. Documenté dans QINDU-0006 CISO/QA (2 reviewers)."
  - id: R-020
    title: "Prefix DB staleness — 70 patterns compilés, nouveaux formats non détectés"
    affects: [QINDU-0005]
    severity: low
    status: accepted
    resolution: "Les 70 préfixes de secrets API sont compilés en dur. Un nouveau fournisseur AI avec un format de clé inédit ne sera pas détecté par le recognizer SECRET (prefix) — le recognizer entropy (4-layer) fournit une mitigation partielle. Mise à jour = recompilation du binaire. Accepté V1. Documenté dans QINDU-0005 closure/DPO (2 reviewers)."
  - id: R-021
    title: "SR-13 non implémenté — TLS SNI host absent des logs de détection"
    affects: [QINDU-0007]
    severity: medium
    status: accepted
    resolution: "Le requirement CISO SHOULD de QINDU-0007 (logguer le champ host TLS SNI dans les entrées de détection) n'est pas implémenté. Les logs monitor_scan ne contiennent pas le hostname de la connexion TLS, rendant le diagnostic multi-domaine plus difficile. Aucun sprint assigné. Accepté V1. Documenté dans QINDU-0007 CISO review."
  - id: R-022
    title: "NAME false positives — stop-word list limitée à 26 mots"
    affects: [QINDU-0005]
    severity: low
    status: accepted
    resolution: "Les 26 stop-words couvrent les role accounts connus (assistant, system, user, admin...). Des role accounts en langues étrangères ou des patterns rares peuvent produire des faux positifs NAME. Confiance plafonnée à 0.70. Accepté V1. Documenté dans QINDU-0005 closure/DPO (2 reviewers)."
  - id: R-023
    title: "IBAN et IP_ADDRESS non détectés par le moteur PII"
    affects: [QINDU-0005, QINDU-0011, QINDU-0009]
    severity: low
    status: accepted
    resolution: "Le moteur PII (QINDU-0005) ne reconnaît pas les IBAN (MOD-97 non implémenté pour tous les pays) ni les adresses IP. Constaté lors du test manuel ChatGPT dans QINDU-0011: extraction texte fonctionne mais le moteur ne détecte pas ces formats. Gap à combler dans un sprint futur d'amélioration du moteur PII. Accepté V1. Documenté dans QINDU-0011 closure Known Lim 2."
  - id: R-024
    title: "Config override bool fields silently ignored — *bool pointer needed"
    affects: [QINDU-0002]
    severity: medium
    status: resolved
    resolution: "Résolu dans QINDU-0009. PIILogging, CertCacheEnabled (bool → *bool), FailMode (string → *string). MergeFileOverride() utilise checks != nil. Config validation rejette fail_open + enforce. Nil-safe accesseurs partout."
  - id: R-025
    title: "MSI upgrade certutil -addstore duplicate CN blocks installation"
    affects: [QINDU-0002]
    severity: medium
    status: resolved
    resolution: "Résolu dans QINDU-0009. Même CA CN fonctionne à travers réinstallations. Vérifié QEMU : désinstallation propre (DELETEDATA=1) puis réinstallation fraîche — pas de conflit CN."
  - id: R-026
    title: "MITM upstream dial sans timeout — goroutine leak sur connexion hung"
    affects: [QINDU-0001]
    severity: medium
    status: accepted
    resolution: "Le chemin MITM utilise tls.Dial sans timeout. Le chemin tunnel utilise net.DialTimeout(10s). Une connexion hung vers un service AI externe cause une fuite de goroutine. Accepté V1 — le graceful shutdown 30s nettoie au pire cas. Correction recommandée dans QINDU-0002, jamais implémentée. Documenté dans QINDU-0001 CISO review SEC-F1."
  - id: R-027
    title: "Pas de génération SBOM/SPDX dans le CI"
    affects: [QINDU-0004]
    severity: medium
    status: accepted
    resolution: "Aucun SBOM CycloneDX ou SPDX généré. go mod verify fournit une intégrité partielle mais pas de format machine-readable standard. Angle mort supply chain pour consommateurs downstream, audits de conformité, scanners de vulnérabilités. Accepté V1. Documenté dans QINDU-0004/0008 release reviews."
  - id: R-028
    title: "Pas d'attestation SLSA build provenance"
    affects: [QINDU-0004]
    severity: medium
    status: accepted
    resolution: "Aucune provenance signée ni attestation in-toto. Niveau SLSA ~1 (build scripté, versionné, checksum). Impossible de prouver cryptographiquement que le MSI a été buildé depuis le commit source annoncé. Un runner CI compromis pourrait produire des binaires backdoorés. Accepté V1. Documenté dans QINDU-0004/0008 release reviews."
  - id: R-029
    title: "pii_logging: false config flag is dead code — aucun effet runtime"
    affects: [QINDU-0001, QINDU-0005]
    severity: medium
    status: accepted
    resolution: "Le champ pii_logging: false est parsé dans la config mais aucun middleware de redaction n'existe. Un opérateur qui s'appuie sur ce flag a un faux sentiment de sécurité. Devient critique à partir de QINDU-0005+ (traitement PII). Accepté V1 — le logging PII n'est pas encore actif en mode monitor. Documenté dans QINDU-0001 DPO review DPO-F3."
  - id: R-030
    title: "Binaire agent.exe tracké dans Git — supply chain anti-pattern"
    affects: [QINDU-0002, QINDU-0008]
    severity: medium
    status: accepted
    resolution: "installer/wix/agent.exe est versionné dans Git. Le binaire tracké pourrait diverger de ce que le CI produit depuis les sources. Le CI rebuild toujours depuis source, donc risque de divergence mitigé. Accepter V1 — soit retirer du tracking, soit ajouter vérification CI que le binaire tracké matche le build. Documenté dans QINDU-0008 release review RL-004."
  - id: R-031
    title: "Pas de cleanup per-user vault.db/Key à la désinstallation MSI"
    affects: [QINDU-0008, QINDU-0009]
    severity: medium
    status: accepted
    resolution: "Quand le vault sera câblé (QINDU-0009), vault.db + vault.key persisteront dans chaque profil utilisateur (%LOCALAPPDATA%\\Qindu\\) après désinstallation. Le MSI tourne en SYSTEM et ne peut pas énumérer les profils utilisateurs. Aucun moyen software-assisted de purger les données PII. Différent de R-014 (MSI orphaned registration = installation interrompue). Documenté dans QINDU-0008 DPO NB-3 / wix-cleanup-audit WIX-006."
  - id: R-032
    title: "Sous-répertoire logs non pré-créé par WiX — ACL gap + 0755"
    affects: [QINDU-0008]
    severity: medium
    status: accepted
    resolution: "Go crée %PROGRAMDATA%\\Qindu\\logs\\ avec os.MkdirAll(dir, 0755) au premier usage. Le répertoire est world-readable et peut ne pas hériter correctement les ACLs du parent créé par WiX. R-015 couvre les permissions fichier (0644) mais pas ce gap de création répertoire. Documenté dans QINDU-0008 wix-cleanup-audit WIX-003."
  - id: R-033
    title: "SeImpersonatePrivilege révoqué par GPO → toutes connexions denied"
    affects: [QINDU-0008, QINDU-0009]
    severity: medium
    status: accepted
    resolution: "L'impersonation token Windows (ImpersonateLoggedOnUser) nécessite SeImpersonatePrivilege. NT AUTHORITY\\LocalService l'a par défaut, mais une GPO peut le révoquer → toutes les tentatives d'impersonation échouent → DENY pour chaque connexion. Le vault devient inutilisable en mode service. Risque de disponibilité, pas de perte de données (deny est safe). Ajouter un WARNING au startup si le privilège est absent. Documenté dans QINDU-0008 lazy-vault-analysis §7."
  - id: R-034
    title: "Logging `stderr` en mode service Windows ne produit pas de fichier agent.log"
    affects: [QINDU-0008]
    severity: medium
    status: accepted
    resolution: "Quand logging.output est 'stderr' (défaut), le wrapper service Windows ne capture pas stderr → aucun fichier agent.log produit. Le pipeline enforce tourne mais sans trace d'audit — impossible de vérifier la tokenisation/réhydratation. Workaround: utiliser output: 'file' ou 'both'. Corriger le défaut MSI dans un sprint futur. Documenté dans QINDU-0009 qemu-test-report.md NB-1."
  - id: R-035
    title: "Policies Chrome/Edge registry non nettoyées à la désinstallation MSI"
    affects: [QINDU-0002]
    severity: medium
    status: accepted
    resolution: "Les clés registre ProxyMode/ProxyPacUrl/QuicAllowed sous HKLM\\Software\\Policies\\Google\\Chrome et HKLM\\Software\\Policies\\Microsoft\\Edge persistent après désinstallation MSI. Le composant WiX est traqué correctement — possible bug de séquencement MSI (RemoveRegistryValues avant InstallFinalize?). Workaround: reg delete manuel. Documenté dans QINDU-0009 qemu-test-report.md NB-3."

