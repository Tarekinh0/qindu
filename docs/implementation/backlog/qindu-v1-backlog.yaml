# ─── Phase 1: Fondation Proxy ───────────────────────────────────────
items:

- id: QINDU-0001
  title: "Proxy TLS local sélectif - Fondation"
  status: DONE
  adr_ref: [ADR-001, ADR-002, ADR-003, ADR-004, ADR-005, ADR-006, ADR-007, ADR-008, ADR-009, ADR-010]
  domains: [proxy, tls, policy, logging, service]
  dependencies: []
  gates_required: [DPO, CISO, QA, Release]
  human_inputs_required: []
  forbidden: [PII detection, tokenization, vault, rehydration, installer]
  acceptance_evidence: "Le proxy démarre en mode console, accepte les CONNECT, fait du MITM sur les domaines IA configurés, tunnel les autres, sert /proxy.pac et /health, logge en JSON sans PII, graceful shutdown 30s."
  notes: "Fondation squelette de tout le projet. Interceptor NoOp. Tests testcontainers-go."
  last_sprint_folder: "docs/implementation/sprints/QINDU-0001/"
  closure_date: "2026-06-13"
  go_version: "1.26"
  test_count: 122
  bugs_fixed: 13

- id: QINDU-0002
  title: "Installer Windows + Service"
  status: DRAFT
  adr_ref: [ADR-003, ADR-006, ADR-010]
  domains: [installer, windows-service, trust-store, chrome-policy, edge-policy, firewall]
  dependencies: [QINDU-0001]
  gates_required: [DPO, CISO, QA, Release]
  human_inputs_required: ["signature de code Windows (certificat)"]
  forbidden: [PII detection, tokenization, vault]
  acceptance_evidence: "Installation MSI : service Windows créé, CA dans le trust store, policies Chrome/Edge appliquées, PAC configurée, QUIC désactivé, firewall loopback en place, /health répond."
  notes: "Wix Toolset pour MSI. Élévation admin requise."

- id: QINDU-0003
  title: "Désinstallation propre"
  status: DRAFT
  adr_ref: [ADR-003, ADR-006]
  domains: [installer, trust-store, cleanup]
  dependencies: [QINDU-0002]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [PII detection, tokenization, vault]
  acceptance_evidence: "Désinstallation : service arrêté, CA supprimée du trust store, clé CA supprimée, policies Chrome/Edge retirées, firewall supprimé, vault conservé ou supprimé selon choix. Pas de traces résiduelles."
  notes: "Option conserver/supprimer le vault explicitement demandée à l'utilisateur."

- id: QINDU-0004
  title: "CI/CD Pipeline"
  status: DRAFT
  adr_ref: [ADR-007]
  domains: [ci, cd, github-actions]
  dependencies: [QINDU-0001]
  gates_required: [CISO, Release]
  human_inputs_required: ["GitHub secrets pour code signing (futur)"]
  forbidden: [PII in CI logs, secrets in repo]
  acceptance_evidence: "GitHub Actions : go vet, go test, cross-compilation GOOS=windows sur ubuntu-latest. Tests intégration testcontainers-go passent."
  notes: "Pas de déploiement automatique en V1. Build vérifié seulement."

# ─── Phase 2: Moteur PII ──────────────────────────────────────────

- id: QINDU-0005
  title: "Moteur PII Go-native - Recognizers"
  status: DRAFT
  adr_ref: [ADR-004]
  domains: [pii, recognizers, regex, validators]
  dependencies: [QINDU-0001]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [real PII in test fixtures, PII in logs]
  acceptance_evidence: "Recognizers pour EMAIL, PHONE, IBAN, CREDIT_CARD (Luhn), API_KEY, JWT. Résolution d'overlaps. Tests unitaires 100%. Score > 0.7 par défaut."
  notes: "Faux négatifs acceptés pour noms de personnes."

- id: QINDU-0006
  title: "Tokenisation"
  status: DRAFT
  adr_ref: [ADR-004]
  domains: [tokenize, pii]
  dependencies: [QINDU-0005]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [real PII in test fixtures]
  acceptance_evidence: "Tokenizer remplace PII par <<PII_TYPE_ID>>. Format stable, réversible. Même valeur → même token dans une conversation. Tests unitaires."
  notes: "Intégration avec le moteur PII (QINDU-0005)."

- id: QINDU-0007
  title: "Mode Monitor (détection sans modification)"
  status: DRAFT
  adr_ref: [ADR-004]
  domains: [proxy, pii, interceptor]
  dependencies: [QINDU-0001, QINDU-0005]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [modification des requêtes en mode monitor]
  acceptance_evidence: "Mode monitor loggue les entités détectées sans modifier le trafic. Logs structurés JSON avec entity_count, entities[], pii_values_logged=false."
  notes: "Première utilisation réelle de l'Interceptor PII."

# ─── Phase 3: Vault et Réhydratation ─────────────────────────────

- id: QINDU-0008
  title: "Vault local chiffré"
  status: DRAFT
  adr_ref: [ADR-003]
  domains: [vault, crypto, dpapi]
  dependencies: [QINDU-0006]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [PII in logs, vault in plaintext, cloud sync]
  acceptance_evidence: "Vault stocke token→valeur, chiffré DPAPI, TTL configurable (24h/7j/infini). Scoped par provider et conversation. Tests chiffrement/déchiffrement."
  notes: "Stockage: %PROGRAMDATA%\\Qindu\\vault.db (chiffré)."

- id: QINDU-0009
  title: "Mode Enforce + Réhydratation non-streaming"
  status: DRAFT
  adr_ref: [ADR-004]
  domains: [proxy, tokenize, vault, interceptor]
  dependencies: [QINDU-0007, QINDU-0008]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [PII leakage in upstream requests, PII in logs]
  acceptance_evidence: "Mode enforce tokenise les requêtes avant envoi upstream. Réponses non-streaming réhydratées. ChatGPT fonctionnel avec un prompt contenant un email."
  notes: "Intégration complète Interceptor PII + Tokenizer + Vault."

- id: QINDU-0010
  title: "Réhydratation streaming (SSE)"
  status: DRAFT
  adr_ref: [ADR-004]
  domains: [proxy, tokenize, sse]
  dependencies: [QINDU-0009]
  gates_required: [DPO, CISO, QA]
  human_inputs_required: []
  forbidden: [buffering complet réponse, PII in logs]
  acceptance_evidence: "Réponses SSE avec tokens coupés entre chunks sont correctement réhydratées. Buffer glissant < 4KB. Latence minimale préservée."
  notes: "Dernière pièce critique du flux PII. Gère tokens partiels et modifiés."

