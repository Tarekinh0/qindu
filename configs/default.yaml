agent:
  listen_addr: "127.0.0.1"
  listen_port: 8787
  mode: "monitor"           # transparent | monitor | enforce
  fail_mode: "fail_open"    # fail_open | fail_closed
  monitor:
    scan_paths:
      - "/conversation"       # ChatGPT (backend-anon, backend-api)
      - "/v1/messages"        # Claude / Anthropic
      - "/chat/completions"   # DeepSeek, OpenAI-compatible APIs
      - "generateContent"      # Gemini (matches :generateContent or /generateContent)
      - "/chat/"              # Copilot, various chat endpoints
  vault:
    ttl: 168h   # 24h, 168h (7 days, default), 0 = infinite (WARNING: PII persists indefinitely)
    # TTL enforcement via startup sweep + background sweeper (interval = min(ttl/7, 24h))
    # + access-time check. If proxy is stopped before a sweep fires,
    # data may briefly persist beyond configured TTL.

tls:
  ca_name: "Qindu AI Privacy CA"
  ca_validity_years: 10
  ca_key_algorithm: "ECDSA_P256"
  cert_cache_enabled: true
  upstream_validation: "system"

providers:
  chatgpt:
    enabled: true
    domains:
      - "chatgpt.com"
  claude:
    enabled: true
    domains:
      - "claude.ai"

logging:
  level: "info"
  format: "json"
  pii_logging: true
  output: "stderr"          # stderr | file | both
  log_dir: ""               # empty = auto-detect (C:\ProgramData\Qindu\logs on Windows)
